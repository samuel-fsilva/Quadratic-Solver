<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quadratic Solver</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script type="module">
      import { LaTeXJSComponent } from "https://cdn.jsdelivr.net/npm/latex.js/dist/latex.mjs";
      customElements.define("latex-js", LaTeXJSComponent);
    </script>
    <style>
      latex-js {
        margin: 0;
        display: flex;
        scale: 1.5;
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <div id="inputs-box">

        <div id="input01-box">
          <label for="c1">Coeficiente a:</label
          ><input type="number" id="c1" placeholder="a" />
        </div>
        <div id="input02-box">
          <label for="c2">Coeficiente b:</label
          ><input type="number" id="c2" placeholder="b" />
        </div>
        <div id="input03-box">
          <label for="c3">Coeficiente c:</label
          ><input type="number" id="c3" placeholder="c" />
        </div>
      </div>
      <div id="button-box">
        <latex-js style="width: 150px">$$ax^{2}+bx+c=0$$</latex-js
        ><button id="submit">
          <p>Calcular</p>
          <?xml version="1.0" encoding="utf-8"?>
          <svg
            width="800px"
            height="800px"
            viewBox="0 0 1024 1024"
            class="icon"
            version="1.1"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M256 120.768L306.432 64 768 512l-461.568 448L256 903.232 659.072 512z"
              fill="#fff"
            />
          </svg>
        </button>
      </div>
      <div id="result-box"></div>
    </div>
    <script src="js/dom.js"></script>
    <script src="js/calc.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
